<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital+ | Usuários</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#39e75f;--teal:#06d6a0;--red:#ef4444;--dark:#0a0f0d;--dark3:#161e16;--dark4:#1c271c;--border:#1f3320;--border2:#2a4a2e;--text:#e8f5ea;--text2:#94a894;--radius:12px}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% -10%,rgba(57,231,95,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
.layout{display:flex;min-height:100vh;position:relative;z-index:1}
.sidebar{width:220px;flex-shrink:0;background:var(--dark3);border-right:1px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:4px;position:fixed;top:0;left:0;height:100vh;z-index:10}
.main{margin-left:220px;flex:1;padding:2rem}
.logo-wrap{text-align:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.logo-img{height:36px;filter:drop-shadow(0 0 12px rgba(57,231,95,0.3))}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;transition:all .15s;border:1px solid transparent}
.nav-link:hover{background:var(--dark4);color:var(--text)}
.nav-link.active{background:rgba(57,231,95,.08);border-color:var(--border2);color:var(--green)}
.nav-icon{font-size:15px;width:18px;text-align:center}
.logout-btn{background:none;border:1px solid var(--border2);color:var(--text2);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;margin-top:auto;width:100%;text-align:left;display:flex;align-items:center;gap:8px;transition:all .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.page-title{font-family:'Exo 2',sans-serif;font-size:20px;font-weight:600}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px}
.card{background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.card-title{font-family:'Exo 2',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--green);margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:14px;background:linear-gradient(to bottom,var(--green),var(--teal));border-radius:2px}
.user-head{display:grid;grid-template-columns:2fr 2fr 1fr 120px;padding:10px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:1px solid var(--border)}
.user-row{display:grid;grid-template-columns:2fr 2fr 1fr 120px;padding:14px 16px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s}
.user-row:last-child{border-bottom:none}
.user-row:hover{background:var(--dark4)}
.user-name{font-weight:500;font-size:14px}
.user-email{font-size:12px;color:var(--text2);margin-top:2px}
.badge-admin{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(57,231,95,.1);color:var(--green)}
.badge-user{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(148,168,148,.1);color:var(--text2)}
.row-actions{display:flex;gap:6px}
.btn-sm{padding:5px 10px;font-size:11px;font-weight:600;border-radius:6px;border:1px solid var(--border2);background:var(--dark4);color:var(--text2);cursor:pointer;font-family:'Exo 2',sans-serif;transition:all .15s}
.btn-sm:hover{border-color:var(--green);color:var(--green)}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red)}
.btn-add{display:flex;align-items:center;gap:8px;padding:9px 18px;font-size:13px;font-weight:600;font-family:'Exo 2',sans-serif;border-radius:8px;border:none;background:var(--green);color:#0a0f0d;cursor:pointer;box-shadow:0 0 16px rgba(57,231,95,.2)}
.btn-add:hover{background:#5ef07a}
.loading{text-align:center;padding:2rem;color:var(--text2);font-size:13px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(57,231,95,.2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.acesso-negado{text-align:center;padding:3rem;color:var(--text2)}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal-box{background:var(--dark3);border:1px solid var(--border2);border-radius:16px;padding:2rem;width:100%;max-width:400px;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer}
.modal-title{font-family:'Exo 2',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--green);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.modal-title::before{content:'';width:3px;height:14px;background:linear-gradient(to bottom,var(--green),var(--teal));border-radius:2px}
.fg{margin-bottom:.75rem}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.fg input{width:100%;padding:9px 12px;font-size:14px;font-family:'Inter',sans-serif;border:1px solid var(--border2);border-radius:8px;background:var(--dark4);color:var(--text);outline:none;transition:border-color .15s}
.fg input:focus{border-color:var(--green)}
.btn-full{width:100%;padding:10px;font-size:13px;font-weight:600;font-family:'Exo 2',sans-serif;border-radius:8px;border:none;background:var(--green);color:#0a0f0d;cursor:pointer;margin-top:.75rem}
.btn-full:hover{background:#5ef07a}
.btn-full:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{width:100%;padding:10px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;margin-top:.5rem}
.msg{font-size:13px;margin-top:.75rem;min-height:18px}
.msg.ok{color:var(--teal)}.msg.erro{color:var(--red)}
</style>
</head>

<script>
const { createClient } = supabase;
const sb = createClient('https://rkritsqmaiqyjdonsqqn.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrcml0c3FtYWlxeWpkb25zcXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTY1NzYsImV4cCI6MjA5MTg5MjU3Nn0.uej4YE67KOiL1UZsYaxO2ZD8BOyKL0qBPMrVoFKc-tI');
const ADMIN_EMAIL = 'regina@digitalmaiscontabilidade.com';
let sessao = null;
let userSel = null;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/login.html'; return; }
  sessao = session;
  if (session.user.email !== ADMIN_EMAIL) {
    document.getElementById('conteudo').innerHTML = `<div class="acesso-negado"><p style="font-size:2rem;margin-bottom:1rem">🔒</p><p style="font-size:15px;font-weight:600">Acesso restrito</p><p style="margin-top:8px;font-size:13px">Somente a administradora pode gerenciar usuários.</p></div>`;
    return;
  }
  carregarUsuarios();
}

async function adminFetch(body) {
  return fetch('/api/admin', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + sessao.access_token
    },
    body: JSON.stringify(body)
  });
}

async function carregarUsuarios() {
  document.getElementById('conteudo').innerHTML = '<div class="loading"><span class="spin"></span>Carregando usuários...</div>';
  const resp = await adminFetch({ action: 'list' });
  const data = await resp.json();
  const users = data.users || [];

  if (!users.length) {
    document.getElementById('conteudo').innerHTML = '<div class="loading">Nenhum usuário encontrado.</div>';
    return;
  }

  const rows = users.map(u => {
    const isAdmin = u.email === ADMIN_EMAIL;
    const nome = u.user_metadata?.name || u.email.split('@')[0];
    const criado = new Date(u.created_at).toLocaleDateString('pt-BR');
    return `<div class="user-row">
      <div><div class="user-name">${nome}</div><div class="user-email">${u.email}</div></div>
      <div style="font-size:13px;color:var(--text2)">${criado}</div>
      <div>${isAdmin ? '<span class="badge-admin">Admin</span>' : '<span class="badge-user">Usuário</span>'}</div>
      <div class="row-actions">${isAdmin
        ? '<span style="font-size:11px;color:var(--text2)">—</span>'
        : `<button class="btn-sm" title="Trocar senha" onclick="abrirModalSenha('${u.id}','${nome}')">🔑 Senha</button>
           <button class="btn-sm danger" title="Remover acesso" onclick="excluirUsuario('${u.id}','${nome}')">✕</button>`
      }</div>
    </div>`;
  }).join('');

  document.getElementById('conteudo').innerHTML = `<div class="card">
    <div class="card-title">Equipe com acesso ao sistema</div>
    <div class="user-head"><div>Usuário</div><div>Cadastrado em</div><div>Perfil</div><div>Ações</div></div>
    ${rows}
  </div>`;
}

function abrirModalNovo() {
  ['n-nome','n-email','n-senha'].forEach(id => document.getElementById(id).value='');
  document.getElementById('msg-novo').textContent='';
  document.getElementById('btn-criar').disabled=false;
  document.getElementById('btn-criar').textContent='✦ Criar usuário';
  document.getElementById('modal-novo').classList.add('open');
}

async function criarUsuario() {
  const nome  = document.getElementById('n-nome').value.trim();
  const email = document.getElementById('n-email').value.trim();
  const senha = document.getElementById('n-senha').value.trim();
  const msg   = document.getElementById('msg-novo');
  const btn   = document.getElementById('btn-criar');
  if (!nome||!email||!senha){msg.textContent='⚠ Preencha todos os campos.';msg.className='msg erro';return}
  if (senha.length<6){msg.textContent='⚠ Senha precisa ter pelo menos 6 caracteres.';msg.className='msg erro';return}
  btn.disabled=true; msg.textContent='Criando...'; msg.className='msg ok';
  const resp = await adminFetch({ action:'create', email, password:senha, name:nome });
  const data = await resp.json();
  if (resp.ok && !data.error) {
    msg.textContent=`✅ ${nome} adicionada com sucesso!`;
    btn.textContent='✓ Criado!';
    setTimeout(()=>{ fecharModal('modal-novo'); carregarUsuarios(); }, 1000);
  } else {
    msg.textContent='❌ '+(data.message||data.error||'Erro ao criar usuário.');
    msg.className='msg erro'; btn.disabled=false; btn.textContent='✦ Criar usuário';
  }
}

function abrirModalSenha(id, nome) {
  userSel=id;
  document.getElementById('ms-titulo').textContent=`Trocar senha — ${nome}`;
  document.getElementById('ms-senha').value='';
  document.getElementById('msg-senha').textContent='';
  document.getElementById('btn-salvar-senha').disabled=false;
  document.getElementById('btn-salvar-senha').textContent='Salvar nova senha';
  document.getElementById('modal-senha').classList.add('open');
}

async function trocarSenha() {
  const senha = document.getElementById('ms-senha').value.trim();
  const msg   = document.getElementById('msg-senha');
  const btn   = document.getElementById('btn-salvar-senha');
  if (senha.length<6){msg.textContent='⚠ Mínimo 6 caracteres.';msg.className='msg erro';return}
  btn.disabled=true; msg.textContent='Salvando...'; msg.className='msg ok';
  const resp = await adminFetch({ action:'password', userId:userSel, password:senha });
  if (resp.ok) {
    msg.textContent='✅ Senha alterada com sucesso!';
    btn.textContent='✓ Salvo!';
    setTimeout(()=>fecharModal('modal-senha'), 1000);
  } else {
    msg.textContent='❌ Erro ao alterar senha.'; msg.className='msg erro'; btn.disabled=false;
  }
}

async function excluirUsuario(id, nome) {
  if (!confirm(`Remover o acesso de ${nome}?\n\nEla não conseguirá mais entrar no sistema.`)) return;
  const resp = await adminFetch({ action:'delete', userId:id });
  if (resp.ok) carregarUsuarios();
  else alert('Erro ao remover usuário. Tente novamente.');
}

function fecharModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); });
});

async function fazerLogout() { await sb.auth.signOut(); window.location.href='/login.html'; }
init();
</script>
</body>
</html>
